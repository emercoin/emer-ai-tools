# Dev stack for the agent gateway. The node (emc) runs from docker-compose.yaml;
# this adds redis + gateway and joins them to the node's network so the gateway
# can reach it at http://emc:6662 over the internal network.
#
#   docker compose up -d                       # start the node (syncs)
#   docker compose -f docker-compose.dev.yaml up -d   # start redis + gateway
services:
  redis:
    image: redis:7-alpine
    container_name: emer-redis

  gateway:
    build: ./gateway
    container_name: emer-gateway
    environment:
      GATEWAY_RPC_URL: http://emc:6662
      GATEWAY_RPC_USER: emcrpc
      GATEWAY_RPC_PASSWORD: emcpass
      GATEWAY_REDIS_URL: redis://redis:6379/0
      GATEWAY_JWT_SECRET: dev-secret-change-me
    ports:
      - "8000:8000"
    depends_on:
      - redis

networks:
  default:
    name: emercoin_docker_default
    external: true
