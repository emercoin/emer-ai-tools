
# Full stack: node + agent tools (adapter, edge, redis).
#
#   dev  (browse adapter & edge /docs on localhost, no secrets):
#     docker compose -f deploy/docker-compose.yaml --profile dev up -d --build
#   prod (adapter hidden, shared-secret gate, restart policies):
#     cp deploy/.env.example deploy/.env   # fill in the secrets
#     docker compose -f deploy/docker-compose.yaml --env-file deploy/.env --profile prod up -d --build
#
# `emc` has no profile, so it runs under both. The dev/prod variants of adapter
# and edge share one container name each (only one profile is ever active), so
# everything addresses them as emer-adapter / emer-edge regardless of profile.
name: emercoin

volumes:
  blockchain_data:
    name: emer_data
    external: true   # the synced blockchain + wallet.dat live here; never auto-removed

x-adapter: &adapter
  build: ../adapter
  container_name: emer-adapter

x-adapter-env: &adapter-env
  ADAPTER_RPC_URL: http://emc:6662
  ADAPTER_RPC_USER: emcrpc
  ADAPTER_RPC_PASSWORD: emcpass

x-edge: &edge
  build: ../edge
  container_name: emer-edge
  ports:
    - "8000:8000"

x-edge-env: &edge-env
  EDGE_ADAPTER_URL: http://emer-adapter:8000
  EDGE_REDIS_URL: redis://redis:6379/0

services:
  emc:
    image: emercoin/core:0.8.5
    container_name: emc
    volumes:
      - blockchain_data:/srv/emercoind
      - ../node/emercoin.conf:/srv/emercoind/emercoin.conf:ro
      - /etc/localtime:/etc/localtime:ro
    stop_grace_period: 40s
    # NB! Use '-reindex' one time while changing version from 0.7.x to 0.8.x
    command: /bin/emercoind -datadir=/srv/emercoind -conf=/srv/emercoind/emercoin.conf -printtoconsole
    ports:
      - "6661:6661"
      - "6662:6662"
      - "5335:5335"

  redis:
    image: redis:7-alpine
    container_name: emer-redis
    profiles: [dev, prod]

  # --- dev: open for debugging (adapter /docs on localhost, no secret) --------
  adapter-dev:
    <<: *adapter
    profiles: [dev]
    environment:
      <<: *adapter-env
      ADAPTER_INTERNAL_KEY: ""
    ports:
      - "127.0.0.1:8001:8000"   # browse the RPC↔REST surface at http://localhost:8001/docs
    depends_on: [emc]

  edge-dev:
    <<: *edge
    profiles: [dev]
    environment:
      <<: *edge-env
      EDGE_ADAPTER_KEY: ""
      EDGE_JWT_SECRET: dev-secret-change-me
    depends_on: [redis]

  # --- prod: adapter hidden, shared-secret gate, auto-restart -----------------
  adapter-prod:
    <<: *adapter
    profiles: [prod]
    environment:
      <<: *adapter-env
      # REQUIRED in prod — set in deploy/.env (openssl rand -hex 32). Empty = open gate.
      ADAPTER_INTERNAL_KEY: ${ADAPTER_INTERNAL_KEY:-}
    restart: unless-stopped
    depends_on: [emc]
    # no host ports: reachable only inside the network (or cross-host behind the key)

  edge-prod:
    <<: *edge
    profiles: [prod]
    environment:
      <<: *edge-env
      # Must equal ADAPTER_INTERNAL_KEY; both REQUIRED in prod (deploy/.env).
      EDGE_ADAPTER_KEY: ${ADAPTER_INTERNAL_KEY:-}
      EDGE_JWT_SECRET: ${EDGE_JWT_SECRET:-}
    restart: unless-stopped
    depends_on: [redis]
