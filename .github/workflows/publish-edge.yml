# Publish the edge image (agent-facing IAM: GitHub login, JWT, rate limit; source
# in edge/). The droplet pulls this instead of building on the box, and Watchtower
# auto-updates the running container when :latest moves.
#
# Triggers (prefixed tag keeps it disjoint from rest-api-v* / node-v*):
#   - push a tag `edge-v*` (e.g. edge-v0.0.1) -> tags {version}, {major.minor}, latest
#   - manual run (workflow_dispatch) -> tags latest
#
# Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (write to the emercoin org).
name: Publish edge image

on:
  push:
    tags: ["edge-v*"]
  workflow_dispatch:

env:
  IMAGE: emercoin/edge

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=edge-v(.*),group=1
            type=match,pattern=edge-v(\d+\.\d+),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/edge-v') || github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./edge
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
