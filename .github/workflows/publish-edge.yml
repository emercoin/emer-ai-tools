# Publish the edge image (agent-facing IAM: GitHub login, JWT, rate limit; source
# in edge/) to Docker Hub, then deploy it on the droplet over SSH — CI pulls +
# recreates just this container on release. No Watchtower, no registry polling, no
# rollout wait (the pull happens once per release, not on a timer).
#
# Triggers (prefixed tag keeps it disjoint from rest-api-v* / node-v*):
#   - push a tag `edge-v*` (e.g. edge-v0.0.1) -> tags {version}, {major.minor}, latest
#   - manual run (workflow_dispatch) -> tags latest
#
# Secrets: DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (push to the emercoin org);
# DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY (the SSH deploy — when unset the deploy
# step is skipped, not failed, so the image still publishes).
name: Publish edge image

# Builds on:
#  - push to main touching edge/  -> moves :latest (+ :sha) and deploys (fast path).
#  - push of an edge-v* tag        -> pinned version image (+ :latest) and deploys.
# (If a release tag is ever skipped by the path filter, re-run via workflow_dispatch.)
on:
  push:
    branches: [main]
    paths:
      - "edge/**"
      - ".github/workflows/publish-edge.yml"
    tags: ["edge-v*"]
  workflow_dispatch:

env:
  IMAGE: emercoin/edge

jobs:
  publish:
    runs-on: ubuntu-latest
    # Surfaced into the env context so the deploy step can self-skip when the SSH
    # secrets aren't configured (the `secrets` context isn't usable in `if:`).
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=edge-v(.*),group=1
            type=match,pattern=edge-v(\d+\.\d+),group=1
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/edge-v') || github.event_name == 'workflow_dispatch' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./edge
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # Roll the new image on the droplet immediately: SSH in and pull+recreate just
      # the edge container. Skipped (not failed) when DEPLOY_HOST is unset.
      - name: Deploy edge on the droplet
        if: env.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: bash /opt/emer-ai-tools/deploy/deploy-service.sh edge
