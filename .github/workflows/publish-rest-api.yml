# Publish the node REST-API image (the policy-free RPCâ†”REST adapter, source in
# adapter/) so other services â€” e.g. the USDTâ†’EMC exchanger in its own repo â€”
# can pull it alongside emercoin/core instead of vendoring the source.
#
# Triggers:
#   - push a tag `v*` (e.g. v0.0.1) -> tags {version}, {major.minor}, latest
#   - manual run (workflow_dispatch) -> tags latest
#
# Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (a Docker Hub access
# token with write to the emercoin org).
name: Publish REST API image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  IMAGE: emercoin/rest-api

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./adapter
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
