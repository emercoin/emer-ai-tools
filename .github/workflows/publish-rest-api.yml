# Publish the node REST-API image (the policy-free RPC↔REST adapter, source in
# adapter/) so other services — e.g. the USDT→EMC exchanger in its own repo —
# can pull it alongside emercoin/core instead of vendoring the source.
#
# Triggers (prefixed tag keeps it disjoint from the node pipeline's node-v*):
#   - push a tag `rest-api-v*` (e.g. rest-api-v0.0.1) -> tags {version}, {major.minor}, latest
#   - manual run (workflow_dispatch) -> tags latest
#
# Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (a Docker Hub access
# token with write to the emercoin org).
name: Publish REST API image

# Builds on push to main touching adapter/ (moves :latest + :sha, then deploys on
# the droplet over SSH) and on rest-api-v* tags (pinned version + :latest). Deploy
# secrets DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY are optional — when unset the
# deploy step is skipped (not failed) and the image still publishes.
on:
  push:
    branches: [main]
    paths:
      - "adapter/**"
      - ".github/workflows/publish-rest-api.yml"
    tags: ["rest-api-v*"]
  workflow_dispatch:

env:
  IMAGE: emercoin/rest-api

jobs:
  publish:
    runs-on: ubuntu-latest
    # Surfaced into env so the deploy step can self-skip when SSH secrets are unset.
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=match,pattern=rest-api-v(.*),group=1
            type=match,pattern=rest-api-v(\d+\.\d+),group=1
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/rest-api-v') || github.event_name == 'workflow_dispatch' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./adapter
          # Multi-arch kept (downstream compose files import this image); the GHA cache
          # reuses the uv-installed deps layer so code-only changes rebuild fast.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Roll the new image on the droplet immediately: SSH in and pull+recreate just
      # the adapter container. Skipped (not failed) when DEPLOY_HOST is unset.
      - name: Deploy adapter on the droplet
        if: env.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: bash /opt/emer-ai-tools/deploy/deploy-service.sh adapter
